project:
  name: medical-ner-id
  language: id
  task: token-classification

data:
  raw_dir: data/raw
  clean_dir: data/clean
  annotated_dir: data/annotated
  source_dataset: iqbalpurba26/health-topic-dataset
  text_column: topic
  raw_file: data/raw/health_topic_dataset.jsonl
  clean_file: data/clean/medical_text_corpus.txt
  metadata_file: data/clean/medical_text_corpus_metadata.csv
  train_file: data/annotated/train.conll
  validation_file: data/annotated/val.conll
  test_file: data/annotated/test.conll
  silver_dir: data/silver
  silver_train_file: data/silver/train.conll
  silver_validation_file: data/silver/val.conll
  silver_test_file: data/silver/test.conll
  manual_gold_dir: data/manual_gold
  manual_gold_file: data/manual_gold/gold_resolved.conll

labels:
  - O
  - B-GEJALA
  - I-GEJALA
  - B-OBAT
  - I-OBAT
  - B-DOSIS
  - I-DOSIS
  - B-DIAGNOSIS
  - I-DIAGNOSIS
  - B-ANATOMI
  - I-ANATOMI

model:
  base_model: indobenchmark/indobert-base-p1
  output_dir: models/indobert-medical-ner-id

models:
  indobert:
    display_name: IndoBERT base p1
    role: utama
    base_model: indobenchmark/indobert-base-p1
    output_dir: models/indobert-medical-ner-id
  xlm_roberta:
    display_name: XLM-RoBERTa base
    role: pembanding
    base_model: xlm-roberta-base
    output_dir: models/xlm-roberta-medical-ner-id

training:
  train_data_source: silver
  learning_rate: 0.00002
  num_train_epochs: 1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  weight_decay: 0.01
  seed: 42
  max_length: 128
  max_train_samples: 2048
  max_eval_samples: 512
  warmup_ratio: 0.1
  max_grad_norm: 1.0
