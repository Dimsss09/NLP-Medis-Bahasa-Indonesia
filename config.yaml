project:
  name: medical-ner-id
  language: id
  task: token-classification

data:
  raw_dir: data/raw
  clean_dir: data/clean
  annotated_dir: data/annotated
  source_dataset: iqbalpurba26/health-topic-dataset
  text_column: topic
  raw_file: data/raw/health_topic_dataset.jsonl
  clean_file: data/clean/medical_text_corpus.txt
  metadata_file: data/clean/medical_text_corpus_metadata.csv
  train_file: data/annotated/train.conll
  validation_file: data/annotated/val.conll
  test_file: data/annotated/test.conll

labels:
  - O
  - B-GEJALA
  - I-GEJALA
  - B-OBAT
  - I-OBAT
  - B-DOSIS
  - I-DOSIS
  - B-DIAGNOSIS
  - I-DIAGNOSIS
  - B-ANATOMI
  - I-ANATOMI

model:
  base_model: indobenchmark/indobert-base-p1
  output_dir: models/indobert-medical-ner-id

training:
  learning_rate: 0.00002
  num_train_epochs: 1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  weight_decay: 0.01
  seed: 42
  max_length: 128
  max_train_samples: 512
  max_eval_samples: 128
  warmup_ratio: 0.1
  max_grad_norm: 1.0
