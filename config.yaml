project:
  name: medical-ner-id
  language: id
  task: token-classification

data:
  raw_dir: data/raw
  clean_dir: data/clean
  annotated_dir: data/annotated
  train_file: data/annotated/train.conll
  validation_file: data/annotated/val.conll
  test_file: data/annotated/test.conll

labels:
  - O
  - B-GEJALA
  - I-GEJALA
  - B-OBAT
  - I-OBAT
  - B-DOSIS
  - I-DOSIS
  - B-DIAGNOSIS
  - I-DIAGNOSIS
  - B-ANATOMI
  - I-ANATOMI

model:
  base_model: indobenchmark/indobert-base-p1
  output_dir: models/indobert-medical-ner-id

training:
  learning_rate: 0.00002
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  weight_decay: 0.01
  seed: 42
